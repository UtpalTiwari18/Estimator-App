<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Estimator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="forgotPassword.css" />
</head>
<body>
  <main class="forgotPage">
    <section class="forgotCard">
      <div class="cardGlow"></div>

      <div class="forgotHeader">
        <p class="brandText">Estimator</p>
        <h1>Forgot Password?</h1>
        <p class="subtitle">
          No worries. Enter your email below and we’ll send you a link to reset your password.
        </p>
      </div>

      <div class="forgotIllustration">
        <img
          src="./images/forgotPassword.png"
          alt="Forgot password illustration"
          class="forgotImage"
        />
      </div>

      <form id="forgotPasswordForm" class="forgotForm" novalidate>
        <div class="formField">
          <label for="emailInput">Email Address</label>
          <div class="inputWrap">
            <span class="inputIcon">✉</span>
            <input
              id="emailInput"
              name="email"
              type="email"
              placeholder="Enter your email"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <button type="submit" class="submitButton">Reset Password</button>

        <div id="formMessage" class="formMessage" aria-live="polite"></div>

        <a href="customerLogin.html" class="backLink">← Back to Login</a>
      </form>
    </section>
  </main>

  <script src="forgotPassword.js"></script>
</body>
</html>
